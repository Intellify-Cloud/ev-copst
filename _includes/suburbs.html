<!-- Suburbs -->
<section class="section section--surface" id="{{ site.data.sitetext.suburbs.section | default: "suburbs" }}">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">{{ site.data.sitetext.suburbs.title }}</h2>
    </div>

    <div class="brand-list{% if site.data.sitetext.suburbs.horizontal-scrolling == "yes" %} brand-list--scroll{% endif %}">
      {% for suburb in site.data.sitetext.suburbs.list %}
      <div class="brand-list__item">
        <img class="brand-list__image" src="{{ suburb.image }}" alt="{{ suburb.title }}" loading="lazy" decoding="async">
      </div>
      {% endfor %}
    </div>
  </div>
</section>
<!-- End Suburbs -->
