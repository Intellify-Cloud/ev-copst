<!-- Testimonials -->
<section class="section testimonials" id="{{ site.data.sitetext.testimonials.section | default: "testimonials" }}">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 text-center">
          <h2 class="section__title">{{ site.data.sitetext.testimonials.title }}</h2>
          
          
         <p class="section__intro">{{ site.data.sitetext.testimonials.text | default: "" }}</p>
        
        </div>
      </div>
      <div class="row">
      {% for person in site.data.sitetext.testimonials.people %}
        <div class="col-lg-4">
          <article class="testimonials__item">
            <!-- <img class="mx-auto rounded-circle" src="{{ person.image }}" alt=""> -->
            <p class="testimonials__quote">{{ person.testimony }}</p>
            <h3 class="testimonials__name">{{ person.name }}</h3>

          </article>
        </div>
      {% endfor %}
      </div>

    </div>
    </section>
    <!-- End Team -->
