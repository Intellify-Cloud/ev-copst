<!-- Team -->
<section class="section section--surface team" id="{{ site.data.sitetext.team.section | default: 'team' }}">
	<div class="container">
	  <div class="section__header">
	    <h2 class="section__title">{{ site.data.sitetext.team.title }}</h2>
	  </div>

	  <div class="team__grid">
		{% for person in site.data.sitetext.team.people %}
		<article class="team__member">
		  <img class="team__photo" src="{{ person.image }}" alt="{{ person.name }}">
		  <h3 class="team__name">{{ person.name }}</h3>
		  <p class="team__role">{{ person.role }}</p>
		  <ul class="team__socials">
			{% for network in person.social %}
			<li>
			  <a class="team__social-link" href="{{ network.url }}" aria-label="Contact {{ person.name }}">
				<i class="{{ network.icon }}"></i>
			  </a>
			</li>
			{% endfor %}
		  </ul>
		</article>
		{% endfor %}
	  </div>
  
	  <div class="text-center">
		<div class="large text-muted">{{ site.data.sitetext.team.subtext | markdownify }}</div>
	  </div>
	</div>
  </section>
  <!-- End Team -->
