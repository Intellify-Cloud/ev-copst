<!-- Portfolio Grid -->
<section class="section section--dark portfolio" id="{{ site.data.sitetext.portfolio.section | default: "portfolio" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section__title">{{ site.data.sitetext.portfolio.title | markdownify | default: "Portfolio" }}</h2>
        <div class="section__intro">{{ site.data.sitetext.portfolio.text | markdownify }}</div>
      </div>
    </div>
    <div class="row">
	{% for project in site.portfolio %}
      <div class="portfolio__item col-md-4 col-sm-6">
        <a class="portfolio__link" data-toggle="modal" href="#p{{ forloop.index }}">
          <div class="portfolio__overlay">
            <div class="portfolio__overlay-content">
              <i class="{{ site.data.style.portfolio-icon | default: "fas fa-plus fa-3x" }}"></i>
            </div>
          </div>
          <img class="img-fluid" src="{{ project.caption.thumbnail }}" alt="">
        </a>
        <div class="portfolio__caption">
          <h4>{{ project.caption.title }}</h4>
          <p class="text-muted">{{ project.caption.subtitle }}</p>
        </div>
      </div>
	{% endfor %}
    </div>
  </div>
</section>
{% include modals.html %}
