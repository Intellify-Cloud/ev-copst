<!-- Clients -->
<section class="section section--surface" id="{{ site.data.sitetext.clients.section | default: "clients" }}">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">{{ site.data.sitetext.clients.title }}</h2>
      {% if site.data.sitetext.clients.sub-title %}
      <p class="section__intro">{{ site.data.sitetext.clients.sub-title }}</p>
      {% endif %}
    </div>
  </div>
  <div class="brand-list-wrapper">
    <div class="brand-list brand-list--marquee" tabindex="0">
      {% for client in site.data.sitetext.clients.list %}
      <div class="brand-list__item">
        <a href="{{ client.url }}" target="_blank" rel="noopener noreferrer">
          <img class="brand-list__image" src="{{ client.logo }}" alt="{{ client.title }}">
        </a>
      </div>
      {% endfor %}
      {% for client in site.data.sitetext.clients.list %}
      <div class="brand-list__item">
        <a href="{{ client.url }}" target="_blank" rel="noopener noreferrer">
          <img class="brand-list__image" src="{{ client.logo }}" alt="{{ client.title }}">
        </a>
      </div>
      {% endfor %}
    </div>
    <div class="brand-list__fade brand-list__fade--start"></div>
    <div class="brand-list__fade brand-list__fade--end"></div>
  </div>
</section>
